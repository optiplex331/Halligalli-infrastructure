apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: halligalli
  labels:
    {{- include "halligalli.labels" . | nindent 4 }}
spec:
  ingressClassName: nginx
  tls:
    - hosts: [{{ .Values.ingress.host | quote }}]
      secretName: {{ .Values.ingress.tlsSecretName | quote }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: halligalli-api
                port:
                  name: http
          - path: /ws/v1
            pathType: Prefix
            backend:
              service:
                name: halligalli-api
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: halligalli-web
                port:
                  name: http
