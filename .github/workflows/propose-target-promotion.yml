name: Reusable Target Promotion Proposal

on:
  workflow_call:
    inputs:
      target:
        description: Closed Deployment Target selection
        required: true
        type: string
      release_tag:
        description: Formal Paired Release Tag to propose
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  attestations: read

jobs:
  promote:
    name: Validate release and propose target Draft PR
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
      PRODUCT_REPOSITORY: optiplex331/Halligalli-BossYang

    steps:
      - name: Check out Infrastructure Repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main

      - name: Download public Paired Release Manifest
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: >-
          curl --fail --location --silent --show-error
          "https://github.com/${PRODUCT_REPOSITORY}/releases/download/${RELEASE_TAG}/paired-release-manifest.json"
          --output paired-release-manifest.json

      - name: Prepare target-scoped Deployment Desired State
        id: promotion
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          TARGET: ${{ inputs.target }}
        run: >-
          python3 .github/utils/prepare_target_promotion.py
          --target "${TARGET}"
          --release-tag "${RELEASE_TAG}"
          --manifest paired-release-manifest.json
          --pr-body-output /tmp/promotion-pr.md

      - name: Verify paired artifact provenance
        if: steps.promotion.outputs.promotion_required == 'true'
        shell: bash
        env:
          API_IMAGE: ${{ steps.promotion.outputs.api_image }}
          COMMIT: ${{ steps.promotion.outputs.commit }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          WEB_IMAGE: ${{ steps.promotion.outputs.web_image }}
        run: |
          set -euo pipefail
          for image in "${WEB_IMAGE}" "${API_IMAGE}"; do
            gh attestation verify "oci://${image}" \
              --repo "${PRODUCT_REPOSITORY}" \
              --signer-workflow "${PRODUCT_REPOSITORY}/.github/workflows/container.yml" \
              --source-ref "refs/tags/${RELEASE_TAG}" \
              --source-digest "${COMMIT}" \
              --deny-self-hosted-runners
          done

      - name: Create or update Draft target promotion PR
        if: steps.promotion.outputs.promotion_required == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ github.token }}
          branch: ${{ steps.promotion.outputs.promotion_branch }}
          base: main
          add-paths: ${{ steps.promotion.outputs.desired_state_path }}
          commit-message: ${{ steps.promotion.outputs.commit_message }}
          committer: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          title: ${{ steps.promotion.outputs.commit_message }}
          body-path: /tmp/promotion-pr.md
          draft: always-true
