name: Target Promotion - Container Apps

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Formal Paired Release Tag to propose for container-apps
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  attestations: read

concurrency:
  group: container-apps-release-promotion
  cancel-in-progress: false

jobs:
  promote-container-apps:
    name: Propose Container Apps Deployment Desired State
    uses: ./.github/workflows/promote-target-release.yml
    with:
      target: container-apps
      release_tag: ${{ inputs.release_tag }}
