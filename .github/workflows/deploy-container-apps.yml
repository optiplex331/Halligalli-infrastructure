name: Deploy Container Apps Live Demo

on:
  push:
    branches: [main]
    paths:
      - deployment/container-apps/desired-state.json
      - terraform/container-apps/**
      - .github/utils/container_apps_revision.py
      - .github/workflows/deploy-container-apps.yml

permissions:
  contents: read

concurrency:
  group: deploy-container-apps
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-24.04
    outputs:
      deployment_enabled: ${{ steps.state.outputs.deployment_enabled }}
    env:
      DESIRED_STATE: deployment/container-apps/desired-state.json
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Check whether desired state is deployable
        id: state
        run: echo "deployment_enabled=$(jq -r '.deploymentEnabled == true' "${DESIRED_STATE}")" >> "${GITHUB_OUTPUT}"
      - name: Validate deployable desired state
        if: steps.state.outputs.deployment_enabled == 'true'
        run: python3 .github/utils/container_apps_revision.py "${DESIRED_STATE}" --revision-suffix "r${GITHUB_RUN_NUMBER}-${GITHUB_SHA:0:7}" --output /tmp/candidate-revision.json

  deploy:
    needs: preflight
    if: needs.preflight.outputs.deployment_enabled == 'true'
    runs-on: ubuntu-24.04
    environment: container-apps
    env:
      RESOURCE_GROUP: halligalli-container-apps
      CONTAINER_APP: halligalli-live-demo
      DESIRED_STATE: deployment/container-apps/desired-state.json
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Render candidate revision
        id: candidate
        shell: bash
        run: |
          set -euo pipefail
          commit="$(jq -r ".releaseCommit" "${DESIRED_STATE}")"
          suffix="r${GITHUB_RUN_NUMBER}-${commit:0:7}"
          python3 .github/utils/container_apps_revision.py "${DESIRED_STATE}" --revision-suffix "${suffix}" --output candidate-revision.json
          echo "suffix=${suffix}" >> "${GITHUB_OUTPUT}"
      - name: Sign in with resource-group-scoped service principal
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Record previous verified revision
        id: previous
        shell: bash
        run: |
          set -euo pipefail
          # shellcheck disable=SC2016
          previous_revision="$(az containerapp ingress traffic show --resource-group "${RESOURCE_GROUP}" --name "${CONTAINER_APP}" --query '[?weight==`100`].revisionName | [0]' -o tsv)"
          test -n "${previous_revision}"
          echo "previous_revision=${previous_revision}" >> "${GITHUB_OUTPUT}"
      - name: Deploy zero-traffic candidate revision
        run: az containerapp update --resource-group "${RESOURCE_GROUP}" --name "${CONTAINER_APP}" --yaml candidate-revision.json
      - name: Resolve candidate endpoint
        id: endpoint
        shell: bash
        run: |
          set -euo pipefail
          revision_name="${CONTAINER_APP}--${{ steps.candidate.outputs.suffix }}"
          fqdn="$(az containerapp revision show --resource-group "${RESOURCE_GROUP}" --name "${CONTAINER_APP}" --revision "${revision_name}" --query properties.fqdn -o tsv)"
          echo "revision_name=${revision_name}" >> "${GITHUB_OUTPUT}"
          echo "origin=https://${fqdn}" >> "${GITHUB_OUTPUT}"
      - name: Smoke release identity HTTP and websocket before traffic switch
        env:
          CANDIDATE_ORIGIN: ${{ steps.endpoint.outputs.origin }}
        run: |
          set -euo pipefail
          curl --fail --silent "${CANDIDATE_ORIGIN}/internal/identity" > candidate-identity.json
          python3 .github/utils/external_monitor.py --origin "${CANDIDATE_ORIGIN}" --websocket-path /ws/v1/rooms/monitor
          python3 - <<'PY'
          import json
          state = json.load(open("deployment/container-apps/desired-state.json"))
          identity = json.load(open("candidate-identity.json"))
          assert identity == {"version": state["releaseVersion"], "commit": state["releaseCommit"]}
          PY
      - name: Switch all traffic to verified candidate
        run: az containerapp ingress traffic set --resource-group "${RESOURCE_GROUP}" --name "${CONTAINER_APP}" --revision-weight "${{ steps.endpoint.outputs.revision_name }}=100"
      - name: Restore previous verified revision on failure
        if: failure() && steps.previous.outputs.previous_revision != ''
        run: |
          az containerapp ingress traffic set --resource-group "${RESOURCE_GROUP}" --name "${CONTAINER_APP}" --revision-weight "${{ steps.previous.outputs.previous_revision }}=100"
          az containerapp revision deactivate --resource-group "${RESOURCE_GROUP}" --name "${CONTAINER_APP}" --revision "${{ steps.endpoint.outputs.revision_name }}" || true
      - name: Describe Draft desired-state repair path
        if: failure()
        run: |
          printf '%s\n' 'Live state was restored to the previous verified revision.' \
            'If merged desired state still selects the failed release, create a Draft repair PR that changes only deployment/container-apps/desired-state.json back to that revision pair.' \
            > container-apps-repair.md
      - name: Upload repair instructions
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: container-apps-desired-state-repair
          path: container-apps-repair.md
