name: Reusable Target Promotion

on:
  workflow_call:
    inputs:
      target:
        description: Closed Deployment Target selection
        required: true
        type: string
      release_tag:
        description: Formal Paired Release Tag to propose
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  attestations: read

jobs:
  promote:
    name: Validate release and propose target Draft PR
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
      PRODUCT_REPOSITORY: optiplex331/Halligalli-BossYang

    steps:
      - name: Check out Infrastructure Repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: main

      - name: Resolve closed target and formal release
        env:
          REQUESTED_RELEASE_TAG: ${{ inputs.release_tag }}
          REQUESTED_TARGET: ${{ inputs.target }}
        run: >-
          python3 .github/utils/prepare_release_promotion.py resolve
          --target "${REQUESTED_TARGET}"
          --release-tag "${REQUESTED_RELEASE_TAG}"

      - name: Download public Paired Release Manifest
        run: >-
          curl --fail --location --silent --show-error
          "${ASSET_URL}" --output paired-release-manifest.json

      - name: Prepare target-scoped Deployment Desired State and evidence
        id: promotion
        run: >-
          python3 .github/utils/prepare_release_promotion.py prepare
          --target "${TARGET}"
          --release-tag "${RELEASE_TAG}"
          --manifest paired-release-manifest.json
          --output promoted-desired-state.json
          --pr-body-output /tmp/promotion-pr.md

      - name: Verify Web artifact provenance
        if: steps.promotion.outputs.promotion_required == 'true'
        run: >-
          gh attestation verify "oci://${{ steps.promotion.outputs.web_repository }}@${{ steps.promotion.outputs.web_digest }}"
          --repo "${PRODUCT_REPOSITORY}"
          --signer-workflow "${PRODUCT_REPOSITORY}/.github/workflows/container.yml"
          --source-ref "refs/tags/${RELEASE_TAG}"
          --source-digest "${{ steps.promotion.outputs.commit }}"
          --deny-self-hosted-runners

      - name: Verify API artifact provenance
        if: steps.promotion.outputs.promotion_required == 'true'
        run: >-
          gh attestation verify "oci://${{ steps.promotion.outputs.api_repository }}@${{ steps.promotion.outputs.api_digest }}"
          --repo "${PRODUCT_REPOSITORY}"
          --signer-workflow "${PRODUCT_REPOSITORY}/.github/workflows/container.yml"
          --source-ref "refs/tags/${RELEASE_TAG}"
          --source-digest "${{ steps.promotion.outputs.commit }}"
          --deny-self-hosted-runners

      - name: Apply target-scoped desired state
        if: steps.promotion.outputs.promotion_required == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cp promoted-desired-state.json "${DESIRED_STATE_PATH}"

      - name: Create or update Draft target promotion PR
        if: steps.promotion.outputs.promotion_required == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ github.token }}
          branch: ${{ env.PROMOTION_BRANCH }}
          base: main
          add-paths: ${{ env.DESIRED_STATE_PATH }}
          commit-message: ${{ env.COMMIT_MESSAGE }}
          committer: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          title: ${{ env.COMMIT_MESSAGE }}
          body-path: /tmp/promotion-pr.md
          draft: always-true
