name: Target Promotion - AKS

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Formal paired Halligalli Release Tag to validate and propose
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  attestations: read

concurrency:
  group: aks-release-promotion
  cancel-in-progress: false

jobs:
  promote:
    name: Propose AKS Deployment Desired State
    uses: ./.github/workflows/promote-target-release.yml
    with:
      target: aks
      release_tag: ${{ inputs.release_tag }}
