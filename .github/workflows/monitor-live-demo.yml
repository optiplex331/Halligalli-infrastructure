name: Monitor Live Demo

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: monitor-live-demo
  cancel-in-progress: true

jobs:
  public-uptime:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Check external HTTPS and WebSocket surfaces
        run: python3 .github/utils/external_monitor.py --origin https://play.halligalli.games
